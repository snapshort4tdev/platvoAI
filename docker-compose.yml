services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - DATABASE_URL=${DATABASE_URL}
        - DIRECT_URL=${DIRECT_URL}
        - BETTER_AUTH_SECRET=${BETTER_AUTH_SECRET}
        - BETTER_AUTH_URL=${BETTER_AUTH_URL}
        - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
        - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
        - OPENAI_API_KEY=${OPENAI_API_KEY}
        - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
        - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
        - STRIPE_PRO_PLAN_PRICE_ID=${STRIPE_PRO_PLAN_PRICE_ID}
        - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
        - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
        - IMAGEKIT_PUBLIC_KEY=${IMAGEKIT_PUBLIC_KEY}
        - IMAGEKIT_PRIVATE_KEY=${IMAGEKIT_PRIVATE_KEY}
        - IMAGEKIT_URL_ENDPOINT=${IMAGEKIT_URL_ENDPOINT}
        - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
        - TAVILY_API_KEY=${TAVILY_API_KEY}
    env_file:
      - .env
    ports:
      - "7100:3000"
    environment:
      - NODE_ENV=production
      - DATABASE_URL=${DATABASE_URL}
      - DIRECT_URL=${DIRECT_URL}
      - BETTER_AUTH_URL=${BETTER_AUTH_URL}
      - NEXT_PUBLIC_APP_URL=${NEXT_PUBLIC_APP_URL}
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - OPENAI_API_KEY=${OPENAI_API_KEY}
      - STRIPE_SECRET_KEY=${STRIPE_SECRET_KEY}
      - STRIPE_WEBHOOK_SECRET=${STRIPE_WEBHOOK_SECRET}
      - STRIPE_PRO_PLAN_PRICE_ID=${STRIPE_PRO_PLAN_PRICE_ID}
      - GOOGLE_CLIENT_ID=${GOOGLE_CLIENT_ID}
      - GOOGLE_CLIENT_SECRET=${GOOGLE_CLIENT_SECRET}
      - IMAGEKIT_PUBLIC_KEY=${IMAGEKIT_PUBLIC_KEY}
      - IMAGEKIT_PRIVATE_KEY=${IMAGEKIT_PRIVATE_KEY}
      - IMAGEKIT_URL_ENDPOINT=${IMAGEKIT_URL_ENDPOINT}
      - REPLICATE_API_TOKEN=${REPLICATE_API_TOKEN}
      - TAVILY_API_KEY=${TAVILY_API_KEY}
      - SMTP_HOST=smtp
      - SMTP_PORT=587
      - SMTP_SECURE=false
      - SMTP_FROM=noreply@platvo.com
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
      smtp:
        condition: service_started

  smtp:
    image: boky/postfix
    environment:
      - ALLOWED_SENDER_DOMAINS=platvo.com
      - POSTFIX_myhostname=mail.platvo.com
      - POSTFIX_myorigin=platvo.com
      - POSTFIX_smtp_tls_security_level=may
      - POSTFIX_smtpd_tls_security_level=none
    volumes:
      - /etc/opendkim/keys/platvo.com/mail.private:/etc/opendkim/mail.private:ro
    restart: unless-stopped

  db:
    image: postgres:16-alpine
    environment:
      - POSTGRES_USER=${POSTGRES_USER:-platvo}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD:-platvo_secret}
      - POSTGRES_DB=${POSTGRES_DB:-platvo_ai}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "7101:5432"
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-platvo}"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  postgres_data:
